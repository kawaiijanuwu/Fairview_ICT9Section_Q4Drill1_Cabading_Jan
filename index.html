<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
</head>
<body>

    <h1>Electricity Consumption Classifier</h1>

    <input type="text" id="consumption" placeholder="Enter electricity consumption">
    <button onclick="checkconsumption()">Check</button>

    <script>

    function checkconsumption(){

        var consumption = Number(document.getElementById("consumption").value);

        if(isNaN(consumption) || consumption < 0){
            alert("Please input a valid number.");
            return;
        }

        if (consumption < 100){
            alert("Low Consumption");
        }
        else if (consumption < 200){
            alert("Moderate Consumption");
        }
        else if (consumption < 300){
            alert("High Consumption");
        }
        else if (consumption < 500){
            alert("Very High Consumption");
        }
        else{
            alert("Extreme Consumption");
        }

    }

    </script>
    
</body>
</html>
