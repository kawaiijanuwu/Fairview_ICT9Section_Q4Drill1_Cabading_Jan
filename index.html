<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-image: url(https://images.twinkl.co.uk/tr/raw/upload/u/ux/lightbulb-1875247-1920_ver_1.jpg);
            background-repeat: no-repeat;
        }
        .all{
            max-width:720px;
            margin:40px auto;
            padding:0 16px;
        }
        .inside{
            background:#ffffff;
            border:1px solid #e5e7eb;
            border-radius:12px;
            padding:20px;
            box-shadow:0 8px 20px rgba(17,24,39,0.08);
        }
    </style>
</head>
<body>

   <div class="all">
        <div class="inside">
            <h1>Electricity Consumption Classifier</h1>
            <p class="sub">Enter a value and click the button.</p>

            <div class="row">
                <input type="text" id="Consumption" placeholder="Enter value">
                <button class="btn btn-primary btn-sm mt-2" onclick="checkconsumption()">Check</button>
            </div>
        </div>
    </div>
    <script>

function checkconsumption(){

    var consumption = Number(document.getElementById("Consumption").value);

    if(isNaN(consumption) || consumption < 0){
        alert("Please input a valid number.");
        return;
    }

    if (consumption < 101){
        alert("Lifeline Consumer: Discounted Electricity Rates");
    }
    else if (consumption < 201){
        alert("Low Consumption: Normal residential rate");
    }
    else if (consumption < 301){
        alert("Average Consumption: Typical electricity usage");
    }
    else if (consumption < 501){
        alert("High Consumption: Higher electricity usage");
    }
    else{
        alert("Very High Consumption: Heavy electricity users");
    }

    }
    </script>
    
</body>
</html>
