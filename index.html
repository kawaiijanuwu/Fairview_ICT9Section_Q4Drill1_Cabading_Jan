<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <h1>Electricity Consumption Classifier</h1>

    <input type="text" id="consumption" placeholder="Enter electricity consumption">
    <button onclick="checkconsumption()">Check</button>

    <script>

    function checkconsumption(){

        var consumption = Number(document.getElementById("consumption").value);

        if(isNaN(consumption) || consumption < 0){
            alert("Please input a valid number.");
            return;
        }

        if (consumption < 101){
            alert("Lifeline Consumer: Discounted Electricity Rates");
        }
        else if (consumption < 201){
            alert("Low Consumption: Normal residential rate");
        }
        else if (consumption < 301){
            alert("Average Consumption: Typical electricity usage");
        }
        else if (consumption < 501){
            alert("High Consumption: Higher electricity usage");
        }
        else{
            alert("Very High Consumption: Heavy electricity users");
        }

    }

    </script>
    
</body>
</html>
